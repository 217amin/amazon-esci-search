# configs/esci.yaml
paths:
  raw_examples: "data/raw/shopping_queries_dataset_examples.parquet"
  raw_products: "data/raw/shopping_queries_dataset_products.parquet"
  processed_dir: "../data/processed" 
  artifacts_dir: "../artifacts/systemA"
  matryoshka_dir: "../artifacts/matryoshka_models"
  results_dir: "../results"

debug:
  use_sample: false
  sample_size: 2000

mlflow:
  experiment_name: "Amazon_ESCI_Matryoshka"
  tracking_uri: "mlruns"

biencoder_model: "BAAI/bge-base-en-v1.5"
cross_encoder_model: "mixedbread-ai/mxbai-rerank-base-v1"

#
matryoshka:
  dims: [768, 512, 256, 128, 64]
  lr: 2.0e-5
  epochs: 5
  batch_size: 64 
  max_seq_length: 256
  
reranker:
  max_seq_length: 256
  
retrieval:
  sources: ["dense", "bm25", "splade"]
  matryoshka_dim: 64
  dense_top_k: 500
  sparse_top_k: 500
  candidate_top_k: 200
  rrf_k: 60
  rrf_weights:
        "dense": 1.0
        "splade": 0.5
        "bm25": 0.3

sparse:
  splade_model: "naver/splade-cocondenser-ensembledistil"
  batch_size: 128